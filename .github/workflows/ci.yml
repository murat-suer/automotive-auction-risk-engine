name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint + tests (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install package and dependencies
        run: |
          pip install -e ".[test]"

      - name: Lint
        run: ruff check src scripts tests

      - name: Test
        run: pytest tests -q
